<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContactHub</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>📞 ContactHub</h1>
        
        <!-- Форма добавления контакта -->
        <div class="card">
            <h2>Add New Contact</h2>
            <form id="addContactForm">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required placeholder="Enter name">
                </div>
                <div class="form-group">
                    <label for="phone">Phone:</label>
                    <input type="tel" id="phone" name="phone" required placeholder="Enter phone">
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="Enter email">
                </div>
                <button type="submit" class="btn-primary">➕ Add Contact</button>
            </form>
        </div>

        <!-- Поиск контактов -->
        <div class="card">
            <h2>Search Contacts</h2>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by name, phone, or email...">
            </div>
        </div>

        <!-- Список контактов -->
        <div class="card">
            <h2>Contacts</h2>
            <div id="contactsList">
                <p class="empty-message">No contacts yet. Add your first contact above!</p>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
