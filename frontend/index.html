<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyContacts</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Страница аутентификации -->
    <div id="authPage">
        <div class="auth-container">
            <h1>📞 MyContacts</h1>
            
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="showLoginForm()">Login</div>
                <div class="auth-tab" onclick="showRegisterForm()">Register</div>
            </div>

            <!-- Форма входа -->
            <div id="loginForm" class="auth-form active card">
                <h2>Login</h2>
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginUsername">Username:</label>
                        <input type="text" id="loginUsername" name="loginUsername" required placeholder="Enter username">
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password:</label>
                        <input type="password" id="loginPassword" name="loginPassword" required placeholder="Enter password">
                    </div>
                    <div id="loginError"></div>
                    <button type="submit" class="btn-primary">Login</button>
                </form>
            </div>

            <!-- Форма регистрации -->
            <div id="registerForm" class="auth-form card">
                <h2>Register</h2>
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="registerUsername">Username:</label>
                        <input type="text" id="registerUsername" name="registerUsername" required placeholder="Choose username">
                    </div>
                    <div class="form-group">
                        <label for="registerPassword">Password:</label>
                        <input type="password" id="registerPassword" name="registerPassword" required placeholder="Choose password">
                    </div>
                    <div class="form-group">
                        <label for="registerPasswordConfirm">Confirm Password:</label>
                        <input type="password" id="registerPasswordConfirm" name="registerPasswordConfirm" required placeholder="Confirm password">
                    </div>
                    <div id="registerError"></div>
                    <div id="registerSuccess"></div>
                    <button type="submit" class="btn-primary">Register</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Главное приложение (скрыто до входа) -->
    <div id="mainApp" class="container" style="display: none;">
        <div class="header-bar">
            <h1>📞 MyContacts</h1>
            <div class="user-info">
                Welcome, <strong id="currentUser"></strong>
                <button class="btn-danger" onclick="handleLogout()" style="margin-left: 15px;">Logout</button>
            </div>
        </div>

        <!-- Форма добавления контакта -->
        <div class="card">
            <h2>Add New Contact</h2>
            <form id="addContactForm">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required placeholder="Enter name">
                </div>
                <div class="form-group">
                    <label for="phone">Phone:</label>
                    <input type="tel" id="phone" name="phone" required placeholder="Enter phone">
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="Enter email">
                </div>
                <button type="submit" class="btn-primary">➕ Add Contact</button>
            </form>
        </div>

        <!-- Поиск контактов -->
        <div class="card">
            <h2>Search Contacts</h2>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by name, phone, or email...">
            </div>
        </div>

        <!-- Список контактов -->
        <div class="card">
            <h2>Contacts</h2>
            <div id="contactsList">
                <p class="empty-message">No contacts yet. Add your first contact above!</p>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
